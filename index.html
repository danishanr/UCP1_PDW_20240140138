<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savora Bites</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<div id="home-section" class="section main-container">
    <div class="welcome-card">
        <h1>Welcome To Savora Bites!</h1>
        <p>Made with fresh ingredients and curated with love ✨<br> Support our local goods: Rice bowl, fruit punch, and more.</p>
        
        <div class="button-group">
            <a href="form/form.html" class="btn">Order Here!</a>
            <a href="about/gallery.html" class="btn">Catalogue</a>
        </div>

      <div class="content-box">
        
        <div class="media-wrapper">
        <h2>Rice Bowl</h2>
        <p>A Classic, Never Dissapoints</p>          
          <img
            height="400px" width="300px"
            src="asset/ricebowl.jpeg"
            alt="Rice Bowl"
            class="food1-img"
          >
        </div>

        <div class="media-wrapper">
        <h2>Nasi Geprek</h2>
        <p>Flavorful and Crunchy Every Bite</p>          
          <img
            height="400px" width="300px"
            src="asset/geprek.jpeg"
            alt="Ayam Geprek"
            class="food2-img"
          >
        </div>


        <div class="media-wrapper">
        <h2>Fruit Punch</h2>
        <p>Cold Refreshing Drinks Everytime</p>

          <img
            height="400px" width="300px"
            src="asset/drinks.jpeg"
            alt="Refreshing Drinks"
            class="drinks-img"
          >
        </div>
      </div>
    </div>
</div>
</body>
</html>
